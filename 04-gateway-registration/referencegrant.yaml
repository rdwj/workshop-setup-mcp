apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: allow-openshift-mcp
  namespace: mcp-system
spec:
  from:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      namespace: mcp-ecosystem
  to:
    - group: gateway.networking.k8s.io
      kind: Gateway
