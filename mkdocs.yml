site_name: MCP Ecosystem Workshop
site_description: Deploy and manage the MCP Ecosystem on Red Hat OpenShift AI
repo_url: https://github.com/rdwj/workshop-setup-mcp
repo_name: rdwj/workshop-setup-mcp

theme:
  name: material
  palette:
    primary: red
    accent: red
  features:
    - content.code.copy
    - content.code.annotate
    - navigation.sections
    - navigation.expand
    - navigation.top
    - toc.integrate

docs_dir: deploy/workshop

nav:
  - Home: README.md
  - Modules:
    - "0. Model Endpoint": 00-model-endpoint/README.md
    - "1. Gateway Infrastructure": 01-gateway-infrastructure/README.md
    - "2. MCP Gateway": 02-mcp-gateway/README.md
    - "3. Deploy MCP Server": 03-mcp-server/README.md
    - "4. Gateway Registration": 04-gateway-registration/README.md
    - "5. Identity & Auth": 05-identity-auth/README.md
    - "6. Agent Testing": 06-agent-test/README.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - toc:
      permalink: true
