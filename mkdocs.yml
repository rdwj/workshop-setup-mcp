site_name: MCP Ecosystem Workshop
site_description: Deploy and manage the MCP Ecosystem on Red Hat OpenShift AI
repo_url: https://github.com/rdwj/workshop-setup-mcp
repo_name: rdwj/workshop-setup-mcp

theme:
  name: material
  palette:
    primary: red
    accent: red
  features:
    - content.code.copy
    - content.code.annotate
    - navigation.sections
    - navigation.expand
    - navigation.top
    - toc.integrate

docs_dir: deploy/workshop

nav:
  - Home: README.md
  - Modules:
    - "0. Cluster Prerequisites": 00-cluster-prerequisites/README.md
    - "1. Model Endpoint": 01-model-endpoint/README.md
    - "2. Gateway Infrastructure": 02-gateway-infrastructure/README.md
    - "3. MCP Gateway": 03-mcp-gateway/README.md
    - "4. MCP Server Prerequisites": 04-mcp-server-prerequisites/README.md
    - "5. Deploy MCP Server": 05-mcp-server/README.md
    - "6. Gateway Registration": 06-gateway-registration/README.md
    - "7. Identity & Auth": 07-identity-auth/README.md
    - "8. Deploy Agent": 08-deploy-agent/README.md
    - "9. Agent Testing": 09-agent-test/README.md
  - Reference:
    - "Troubleshooting": troubleshooting.md
    - "Layered Authorization Model": mcp-layered-authorization.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - toc:
      permalink: true
