site_name: MCP Ecosystem Workshop
site_description: Deploy and manage the MCP Ecosystem on Red Hat OpenShift AI
repo_url: https://github.com/rdwj/workshop-setup-mcp
repo_name: rdwj/workshop-setup-mcp

theme:
  name: material
  palette:
    primary: red
    accent: red
  features:
    - content.code.copy
    - content.code.annotate
    - navigation.sections
    - navigation.expand
    - navigation.top
    - toc.integrate

docs_dir: deploy/workshop

nav:
  - Home: README.md
  - Core Path:
    - "Prerequisites": prerequisites/README.md
    - "0. Cluster Prerequisites": 00-cluster-prerequisites/README.md
    - "1. Gateway Infrastructure": 01-gateway-infrastructure/README.md
    - "2. MCP Gateway": 02-mcp-gateway/README.md
    - "3. MCP Server Prerequisites": 03-mcp-server-prerequisites/README.md
    - "4. Deploy MCP Server": 04-mcp-server/README.md
    - "5. Gateway Registration": 05-gateway-registration/README.md
    - "6. Identity — Keycloak": 06-identity-keycloak/README.md
    - "7. External OIDC": 07-external-oidc/README.md
    - "8. AuthPolicies": 08-authpolicies/README.md
    - "9. Developer Onboarding": 09-developer-onboarding/README.md
  - "Track B — Per-User Credentials":
    - "10. GitHub MCP Server": 10-github-mcp-server/README.md
    - "11. Vault — Per-User PATs": 11-vault/README.md
  - "Track C — Model + Agent (Optional)":
    - "12. GPU Compute Node": 12-gpu-node/README.md
    - "13. Models as a Service": 13-models-as-a-service/README.md
    - "14. Deploy a Model": 14-deploy-model/README.md
    - "15. Model Endpoint": 15-model-endpoint/README.md
    - "16. Deploy Agent": 16-deploy-agent/README.md
    - "17. Agent Testing": 17-agent-test/README.md
    - "18. Gen AI Playground": 18-playground/README.md
  - "Track D — Ops (Optional)":
    - "19. Observability": 19-observability/README.md
    - "20. Add a Third-Party MCP Server": 20-add-mcp-server/README.md
  - Reference:
    - "Troubleshooting": troubleshooting.md
    - "Layered Authorization Model": mcp-layered-authorization.md
    - "Architecture Diagrams": https://rdwj.github.io/workshop-setup-mcp/architecture-diagrams.html

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - toc:
      permalink: true
