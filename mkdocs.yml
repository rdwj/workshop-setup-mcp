site_name: MCP Ecosystem Workshop
site_description: Deploy and manage the MCP Ecosystem on Red Hat OpenShift AI
repo_url: https://github.com/rdwj/workshop-setup-mcp
repo_name: rdwj/workshop-setup-mcp

theme:
  name: material
  palette:
    primary: red
    accent: red
  features:
    - content.code.copy
    - content.code.annotate
    - navigation.sections
    - navigation.expand
    - navigation.top
    - toc.integrate

docs_dir: deploy/workshop

nav:
  - Home: README.md
  - Modules:
    - "Prerequisites": prerequisites/README.md
    - "0. Cluster Prerequisites": 00-cluster-prerequisites/README.md
    - "1. GPU Compute Node (Skippable)": 01-gpu-node/README.md
    - "2. Gateway Infrastructure": 02-gateway-infrastructure/README.md
    - "3. Models as a Service (Skippable)": 03-models-as-a-service/README.md
    - "4. Deploy a Model (Skippable)": 04-deploy-model/README.md
    - "5. Model Endpoint": 05-model-endpoint/README.md
    - "6. MCP Gateway": 06-mcp-gateway/README.md
    - "7. MCP Server Prerequisites": 07-mcp-server-prerequisites/README.md
    - "8. Deploy MCP Server": 08-mcp-server/README.md
    - "9. Gateway Registration": 09-gateway-registration/README.md
    - "10. Identity & Auth": 10-identity-auth/README.md
    - "11. Deploy Agent": 11-deploy-agent/README.md
    - "12. Agent Testing": 12-agent-test/README.md
    - "13. Gen AI Playground (Optional)": 13-playground/README.md
    - "14. Vault Integration (Optional)": 14-vault/README.md
  - Reference:
    - "Troubleshooting": troubleshooting.md
    - "Layered Authorization Model": mcp-layered-authorization.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - toc:
      permalink: true
