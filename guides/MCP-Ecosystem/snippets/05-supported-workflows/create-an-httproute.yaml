apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: openshift-mcp-server
spec:
  hostnames:
    - openshift-mcp-server.mcp.local
  parentRefs:
    - name: <gateway-name>
      sectionName: mcps
  rules:
    - backendRefs:
        - name: openshift-mcp-server
          port: 8080
