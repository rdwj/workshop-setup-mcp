apiVersion: v1
kind: ConfigMap
metadata:
  name: mcp-catalog-sources
  namespace: odh-model-registries
data:
  sources.yaml: |
    mcp_catalogs:
      - name: Custom MCP Servers
        id: custom_mcp_servers
        type: yaml
        enabled: true
        properties:
          yamlCatalogPath: /data/user-mcp-sources/custom-mcp-servers.yaml
        labels:
          - Custom
    labels:
      - name: Custom
        assetType: mcp_servers
        displayName: Custom MCP servers
        description: Team-curated MCP servers.
  custom-mcp-servers.yaml: |
    source: Custom MCP
    mcp_servers:
      - name: my-custom-server
        provider: My Team
        license: apache-2.0
        description: A custom MCP server with domain-specific tools.
        version: "1.0"
        transports:
          - http
        tools:
          - name: my_tool
            description: Does something useful
            parameters:
              - name: input
                type: string
                description: The input value
                required: true
        artifacts:
          - uri: oci://registry.example.com/my-custom-server:1.0
        runtimeMetadata:
          defaultPort: 8080
          mcpPath: /mcp
          defaultArgs:
            - --http
            - 0.0.0.0:8080
