apiVersion: kuadrant.io/v1
kind: AuthPolicy
metadata:
  name: mcp-gateway-auth
spec:
  targetRef:
    group: gateway.networking.k8s.io
    kind: Gateway
    name: <gateway-name>
    sectionName: mcp
  rules:
    authentication:
      keycloak-jwt:
        jwt:
          issuerUrl: https://<keycloak-route>/realms/mcp-gateway
