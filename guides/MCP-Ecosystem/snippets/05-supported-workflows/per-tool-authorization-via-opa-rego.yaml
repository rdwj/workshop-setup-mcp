spec:
  rules:
    authorization:
      tool-acl:
        opa:
          rego: |
            allow {
              some g in input.auth.identity.groups
              g == "developers"
              input.request.headers["x-mcp-toolname"] in ["greet", "time", "headers"]
            }
            allow {
              some g in input.auth.identity.groups
              g == "ops"
              input.request.headers["x-mcp-toolname"] in ["add_tool", "slow"]
            }
            allow {
              some g in input.auth.identity.groups
              g == "leads"
            }
