apiVersion: kuadrant.io/v1
kind: RateLimitPolicy
metadata:
  name: mcp-gateway-ratelimit
  namespace: mcp-system
spec:
  targetRef:
    group: gateway.networking.k8s.io
    kind: Gateway
    name: mcp-gateway
    sectionName: mcps
  defaults:
    limits:
      per-user:
        rates:
          - limit: 10
            window: 1m
        counters:
          - expression: auth.identity.preferred_username
