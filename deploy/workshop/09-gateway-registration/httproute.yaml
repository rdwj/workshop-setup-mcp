# Replace <CLUSTER_DOMAIN> with your cluster's apps domain.
# Example: mcp-openshift.apps.cluster-abc.sandbox123.opentlc.com
# Note: use single-level subdomain (mcp-openshift, not openshift.mcp)
# so the hostname matches the OpenShift wildcard TLS certificate.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: openshift-mcp-server
  namespace: mcp-ecosystem
spec:
  parentRefs:
    - name: mcp-gateway
      namespace: mcp-system
      sectionName: mcps
  hostnames:
    - "mcp-openshift.<CLUSTER_DOMAIN>"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /mcp
      backendRefs:
        - name: openshift-mcp-server
          port: 8080
