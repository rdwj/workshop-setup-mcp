# Per-route AuthPolicy: OpenShift MCP server — PER-USER K8S IDENTITY.
#
# Atomically replaces the backend-plane default (mcp-gateway-backend-auth)
# for this route only. The difference: NO Authorization stripping. The
# broker forwards the user's Keycloak JWT on the hairpin leg; this policy
# validates it and lets it through to the OpenShift MCP server, which runs
# in passthrough cluster_auth_mode and uses the incoming Bearer token for
# K8s API calls.
#
# PREREQUISITE: External OIDC (Module 7) must be configured so
# Keycloak JWTs are valid K8s API tokens. Without it, the server forwards
# an invalid token to the K8s API and every tool call fails with
# "provide credentials". K8s RBAC (Module 7: mcp-admins -> cluster-admin,
# mcp-users -> view) then enforces per-user permissions, and the K8s audit
# log attributes every API call to the actual developer.
#
# Tool-level enforcement is repeated here (defense in depth on the hairpin
# leg): even a compromised or misconfigured broker cannot call tools the
# user's JWT doesn't authorize.
#
# Replace KEYCLOAK_ISSUER via sed before applying.
apiVersion: kuadrant.io/v1
kind: AuthPolicy
metadata:
  name: openshift-mcp-route-auth
  namespace: mcp-ecosystem
spec:
  targetRef:
    group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: openshift-mcp-server
  rules:
    authentication:
      keycloak-jwt:
        jwt:
          issuerUrl: KEYCLOAK_ISSUER
        metrics: true
    authorization:
      tool-roles:
        opa:
          rego: |
            allow { not input.request.headers["x-mcp-toolname"] }

            allow {
              servername := input.request.headers["x-mcp-servername"]
              toolname := input.request.headers["x-mcp-toolname"]
              input.auth.identity.resource_access[servername].roles[_] == toolname
            }
        metrics: true
    # No response.success.headers block: the user's JWT passes through
    # untouched. This is the entire point of this policy.
