# OpenShift Route for Keycloak.
# Uses edge TLS — the Route terminates TLS and forwards plain HTTP
# to the Keycloak service (Keycloak runs with httpEnabled: true).
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: keycloak
  namespace: keycloak
spec:
  to:
    kind: Service
    name: keycloak-service
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
