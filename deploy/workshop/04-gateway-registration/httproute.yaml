# Replace <CLUSTER_DOMAIN> with your cluster's apps domain.
# Example: openshift.mcp.apps.cluster-abc.sandbox123.opentlc.com
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: openshift-mcp-server
  namespace: mcp-ecosystem
spec:
  parentRefs:
    - name: mcp-gateway
      namespace: mcp-system
      sectionName: mcps
  hostnames:
    - "openshift.mcp.<CLUSTER_DOMAIN>"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /mcp
      backendRefs:
        - name: openshift-mcp-server
          port: 8080
