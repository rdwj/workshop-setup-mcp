# Replace <CLUSTER_DOMAIN> with your cluster's apps domain.
# Discover it with:
#   oc get ingresses.config.openshift.io cluster -o jsonpath='{.spec.domain}'
#
# The listener hostname uses *.<CLUSTER_DOMAIN> (not *.mcp.<CLUSTER_DOMAIN>)
# because the OpenShift wildcard TLS certificate only covers single-level
# subdomains. HTTPRoutes use hostnames like mcp-openshift.<CLUSTER_DOMAIN>.
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: mcp-gateway
  namespace: mcp-system
spec:
  gatewayClassName: data-science-gateway-class
  listeners:
    - name: mcps
      hostname: "*.<CLUSTER_DOMAIN>"
      port: 8080
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: All
    - name: https
      hostname: "*.<CLUSTER_DOMAIN>"
      port: 443
      protocol: HTTPS
      allowedRoutes:
        namespaces:
          from: All
      tls:
        mode: Terminate
        certificateRefs:
          - name: mcp-gateway-tls
