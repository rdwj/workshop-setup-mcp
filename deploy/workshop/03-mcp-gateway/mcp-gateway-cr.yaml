# Replace <CLUSTER_DOMAIN> with your cluster's apps domain.
# Discover it with:
#   oc get ingresses.config.openshift.io cluster -o jsonpath='{.spec.domain}'
#
# Example: if domain is apps.cluster-abc.sandbox123.opentlc.com,
# the hostname becomes *.mcp.apps.cluster-abc.sandbox123.opentlc.com
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: mcp-gateway
  namespace: mcp-system
spec:
  gatewayClassName: data-science-gateway-class
  listeners:
    - name: mcps
      hostname: "*.mcp.<CLUSTER_DOMAIN>"
      port: 8080
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: All
    - name: https
      hostname: "*.mcp.<CLUSTER_DOMAIN>"
      port: 443
      protocol: HTTPS
      allowedRoutes:
        namespaces:
          from: All
      tls:
        mode: Terminate
        certificateRefs:
          - name: mcp-gateway-tls
