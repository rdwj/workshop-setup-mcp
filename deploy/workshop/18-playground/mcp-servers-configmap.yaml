apiVersion: v1
kind: ConfigMap
metadata:
  name: gen-ai-aa-mcp-servers
  namespace: redhat-ods-applications
data:
  MCP-Gateway-Tools: |
    {
      "url": "https://mcp-gateway.<CLUSTER_DOMAIN>/mcp",
