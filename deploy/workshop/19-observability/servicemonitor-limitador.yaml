apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: limitador-metrics
  namespace: kuadrant-system
  labels:
    app.kubernetes.io/name: limitador
    app.kubernetes.io/part-of: mcp-observability
spec:
  selector:
    matchLabels:
      app: limitador
      limitador-resource: limitador
  endpoints:
  - port: http
    interval: 30s
    path: /metrics
