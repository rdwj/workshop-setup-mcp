apiVersion: v1
kind: Namespace
metadata:
  name: openshift-logging
---
# NOTE: no targetNamespaces — the Loki operator does NOT support
# OwnNamespace install mode (CSV fails with "OwnNamespace InstallModeType
# not supported"). An empty spec selects AllNamespaces mode, which both
# the Loki and Cluster Logging operators support.
apiVersion: operators.coreos.com/v1
kind: OperatorGroup
metadata:
  name: openshift-logging
  namespace: openshift-logging
spec: {}
---
apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: loki-operator
  namespace: openshift-logging
spec:
  channel: stable-6.2
  installPlanApproval: Automatic
  name: loki-operator
  source: redhat-operators
  sourceNamespace: openshift-marketplace
---
apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: cluster-logging
  namespace: openshift-logging
spec:
  channel: stable-6.2
  installPlanApproval: Automatic
  name: cluster-logging
  source: redhat-operators
  sourceNamespace: openshift-marketplace
