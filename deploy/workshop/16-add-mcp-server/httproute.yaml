# Replace <CLUSTER_DOMAIN> with your cluster's apps domain.
# The hostname uses a single-level subdomain for TLS compatibility.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: calculus-helper
  namespace: mcp-ecosystem
spec:
  parentRefs:
    - name: mcp-gateway
      namespace: mcp-system
      sectionName: mcps
  hostnames:
    - "mcp-calculus.<CLUSTER_DOMAIN>"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /mcp
      backendRefs:
        - name: calculus-helper
          port: 8080
