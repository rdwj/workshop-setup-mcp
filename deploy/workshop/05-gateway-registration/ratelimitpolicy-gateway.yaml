# Per-user rate limit on the CLIENT listener (`mcp`). Targeting `mcps`
# would throttle the broker's own hairpin traffic to backends instead of
# (or in addition to) users.
apiVersion: kuadrant.io/v1
kind: RateLimitPolicy
metadata:
  name: mcp-gateway-ratelimit
  namespace: mcp-system
spec:
  targetRef:
    group: gateway.networking.k8s.io
    kind: Gateway
    name: mcp-gateway
    sectionName: mcp
  defaults:
    limits:
      per-user:
        rates:
          - limit: 10
            window: 1m
        counters:
          - expression: auth.identity.preferred_username
