apiVersion: mcp.kuadrant.io/v1alpha1
kind: MCPVirtualServer
metadata:
  name: user-tools
  namespace: mcp-system
spec:
  description: Read-only tools for developers (OpenShift + GitHub)
  tools:
    # OpenShift MCP server (8 read-only tools, unprefixed in v0.7.0)
    - namespaces_list
    - pods_get
    - pods_list
    - pods_list_in_namespace
    - pods_log
    - projects_list
    - resources_get
    - resources_list
    # GitHub MCP server (15 read tools, unprefixed in v0.7.0)
    - get_commit
    - get_file_contents
    - get_me
    - issue_read
    - list_branches
    - list_commits
    - list_issues
    - list_pull_requests
    - list_releases
    - pull_request_read
    - search_code
    - search_issues
    - search_pull_requests
    - search_repositories
    - search_users
