apiVersion: mcp.kuadrant.io/v1alpha1
kind: MCPVirtualServer
metadata:
  name: admin-tools
  namespace: mcp-system
spec:
  description: Full tools for administrators (OpenShift + GitHub)
  tools:
    # OpenShift MCP server tools — UNPREFIXED. MCP Gateway v0.7.0 only
    # applies toolPrefix on name conflicts; with no collisions in this
    # workshop, tool names match the backend exactly. Verify against
    # tools/list after deployment.
    - configuration_view
    - events_list
    - namespaces_list
    - nodes_log
    - nodes_stats_summary
    - nodes_top
    - pods_get
    - pods_list
    - pods_list_in_namespace
    - pods_log
    - pods_top
    - projects_list
    - pods_run
    - resources_get
    - resources_list
    # GitHub MCP server (25 tools, unprefixed in v0.7.0)
    - get_commit
    - get_file_contents
    - get_label
    - get_latest_release
    - get_me
    - get_release_by_tag
    - get_tag
    - get_team_members
    - get_teams
    - issue_read
    - list_branches
    - list_commits
    - list_issue_types
    - list_issues
    - list_pull_requests
    - list_releases
    - list_repository_collaborators
    - list_tags
    - pull_request_read
    - search_code
    - search_commits
    - search_issues
    - search_pull_requests
    - search_repositories
    - search_users
