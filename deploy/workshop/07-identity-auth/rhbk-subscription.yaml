# RHBK (Red Hat Build of Keycloak) operator installation.
#
# IMPORTANT: RHBK only supports OwnNamespace install mode.
# The OperatorGroup must target the keycloak namespace specifically.
# AllNamespaces mode will not work.
---
apiVersion: v1
kind: Namespace
metadata:
  name: keycloak
---
apiVersion: operators.coreos.com/v1
kind: OperatorGroup
metadata:
  name: rhbk-operator-group
  namespace: keycloak
spec:
  targetNamespaces:
    - keycloak
---
apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: rhbk-operator
  namespace: keycloak
spec:
  channel: stable-v24
  installPlanApproval: Manual
  name: rhbk-operator
  source: redhat-operators
  sourceNamespace: openshift-marketplace
