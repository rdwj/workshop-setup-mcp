# AuthPolicy with wristband signing for per-group tool filtering.
#
# The wristband JWT contains an "allowed-tools" claim in the format:
#   {"<server-name>": ["tool1", "tool2", ...]}
# where the server name matches the MCPServerRegistration name in the broker config,
# and tool names are the UNPREFIXED canonical names from the backend MCP server.
# The broker applies prefix independently when exposing tools to clients.
#
# Tool authorization is managed via OPA Rego policy that maps Keycloak
# groups to allowed tool lists. To add tools or groups, edit the Rego
# inline policy below instead of hardcoding tool lists in CEL.
#
# Groups:
#   mcp-admins -> all OpenShift tools (14) + all GitHub tools (25, server runs read-only)
#   all others -> read-only OpenShift tools (8) + subset GitHub tools (15)
#
# Prerequisites:
#   1. Keycloak "mcp-gateway" realm with groups (mcp-admins, mcp-users, mcp-github)
#      and a "groups" client scope with group-membership mapper
#   2. wristband-signing-key secret in kuadrant-system (ECDSA P-256 private key)
#   3. wristband-public-key secret in mcp-system (ECDSA P-256 public key)
#   4. MCPGatewayExtension patched with trustedHeadersKey referencing wristband-public-key
#
# Replace KEYCLOAK_ISSUER with your actual Keycloak realm URL, e.g.:
#   https://keycloak-keycloak.apps.cluster-abc.abc.sandbox1234.opentlc.com/realms/mcp-gateway
apiVersion: kuadrant.io/v1
kind: AuthPolicy
metadata:
  name: mcp-gateway-auth
  namespace: mcp-system
spec:
  targetRef:
    group: gateway.networking.k8s.io
    kind: Gateway
    name: mcp-gateway
    sectionName: mcps
  defaults:
    strategy: atomic
    rules:
      authentication:
        keycloak-jwt:
          jwt:
            issuerUrl: KEYCLOAK_ISSUER
          metrics: true
      authorization:
        tool-roles:
          opa:
            allValues: true
            rego: |
              ocp_admin_tools := [
                "configuration_view",
                "events_list",
                "namespaces_list",
                "nodes_log",
                "nodes_stats_summary",
                "nodes_top",
                "pods_get",
                "pods_list",
                "pods_list_in_namespace",
                "pods_log",
                "pods_top",
                "projects_list",
                "resources_get",
                "resources_list"
              ]

              ocp_user_tools := [
                "namespaces_list",
                "pods_get",
                "pods_list",
                "pods_list_in_namespace",
                "pods_log",
                "projects_list",
                "resources_get",
                "resources_list"
              ]

              gh_admin_tools := [
                "get_commit",
                "get_file_contents",
                "get_label",
                "get_latest_release",
                "get_me",
                "get_release_by_tag",
                "get_tag",
                "get_team_members",
                "get_teams",
                "issue_read",
                "list_branches",
                "list_commits",
                "list_issue_types",
                "list_issues",
                "list_pull_requests",
                "list_releases",
                "list_repository_collaborators",
                "list_tags",
                "pull_request_read",
                "search_code",
                "search_commits",
                "search_issues",
                "search_pull_requests",
                "search_repositories",
                "search_users"
              ]

              gh_user_tools := [
                "get_file_contents",
                "get_me",
                "issue_read",
                "list_branches",
                "list_issues",
                "list_pull_requests",
                "list_releases",
                "pull_request_read",
                "search_code",
                "search_issues",
                "search_pull_requests",
                "search_repositories",
                "search_users",
                "get_commit",
                "list_commits"
              ]

              is_admin {
                input.auth.identity.groups[_] == "mcp-admins"
              }

              ocp_tools := ocp_admin_tools { is_admin }
              ocp_tools := ocp_user_tools { not is_admin }

              gh_tools := gh_admin_tools { is_admin }
              gh_tools := gh_user_tools { not is_admin }

              ocp_key := "mcp-ecosystem/openshift-mcp-server"
              gh_key := "mcp-ecosystem/github-mcp-server"

              allowed_tools := json.marshal({ocp_key: ocp_tools, gh_key: gh_tools})

              allow := true
          metrics: true
      response:
        success:
          headers:
            x-authorized-tools:
              wristband:
                issuer: http://authorino-authorino-oidc.kuadrant-system.svc.cluster.local:8083/mcp-system/mcp-gateway-auth/x-authorized-tools
                signingKeyRefs:
                  - name: wristband-signing-key
                    algorithm: ES256
                tokenDuration: 300
                customClaims:
                  allowed-tools:
                    selector: auth.authorization.tool-roles.allowed_tools
                  groups:
                    selector: auth.identity.groups
              metrics: true
            # Route to the correct MCPVirtualServer based on group membership.
            # This + the wristband are subtractive layers — the broker enforces
            # the intersection. Both tools/list and tools/call are restricted.
            x-mcp-virtualserver:
              plain:
                expression: '"mcp-admins" in auth.identity.groups ? "mcp-system/admin-tools" : "mcp-system/user-tools"'
            # Strip the Authorization header before forwarding to the backend.
            # Without this, the OpenShift MCP server uses the Keycloak JWT
            # for K8s API auth instead of its ServiceAccount token, and fails.
            authorization:
              plain:
                value: ""
          dynamicMetadata:
            user-identity:
              json:
                properties:
                  username:
                    selector: auth.identity.preferred_username
        unauthenticated:
          message:
            value: "Authentication required."
