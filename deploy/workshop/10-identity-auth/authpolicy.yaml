# AuthPolicy with wristband signing and tools/call enforcement.
#
# Tool authorization is driven by Keycloak client roles in the JWT's
# resource_access claim. Each MCP server has a matching bearer-only
# Keycloak client whose client roles represent individual tools.
# The OPA Rego reads these dynamically — adding or removing tool
# permissions only requires Keycloak admin changes, not Rego edits.
#
# The Rego handles two concerns:
#   1. Wristband data — the "allowed_tools" map is signed into the
#      x-authorized-tools header for tools/list filtering.
#   2. Enforcement — on tools/call, the ext_proc injects x-mcp-toolname
#      and x-mcp-servername headers; the Rego checks these against the
#      caller's JWT client roles and denies unauthorized calls.
#
# Groups (still used for VirtualMCPServer routing only):
#   mcp-admins -> routed to admin-tools VirtualMCPServer
#   all others -> routed to user-tools VirtualMCPServer
#
# Prerequisites:
#   1. Keycloak "mcp-gateway" realm with:
#      - Groups (mcp-admins, mcp-users) and a "groups" client scope
#      - Bearer-only clients matching MCPServerRegistration names
#      - Client roles on each matching tool names (unprefixed)
#      - "roles" client scope assigned to the mcp-gateway client
#   2. wristband-signing-key secret in kuadrant-system (ECDSA P-256 private key)
#   3. wristband-public-key secret in mcp-system (ECDSA P-256 public key)
#   4. MCPGatewayExtension patched with trustedHeadersKey referencing wristband-public-key
#
# Replace KEYCLOAK_ISSUER with your actual Keycloak realm URL, e.g.:
#   https://keycloak-keycloak.apps.cluster-abc.abc.sandbox1234.opentlc.com/realms/mcp-gateway
apiVersion: kuadrant.io/v1
kind: AuthPolicy
metadata:
  name: mcp-gateway-auth
  namespace: mcp-system
spec:
  targetRef:
    group: gateway.networking.k8s.io
    kind: Gateway
    name: mcp-gateway
    sectionName: mcps
  defaults:
    strategy: atomic
    rules:
      authentication:
        keycloak-jwt:
          jwt:
            issuerUrl: KEYCLOAK_ISSUER
          metrics: true
      authorization:
        tool-roles:
          opa:
            allValues: true
            rego: |
              allowed_tools := json.marshal({k: v.roles |
                v := input.auth.identity.resource_access[k]
                startswith(k, "mcp-ecosystem/")
              })

              allow { not input.request.headers["x-mcp-toolname"] }

              allow {
                servername := input.request.headers["x-mcp-servername"]
                toolname := input.request.headers["x-mcp-toolname"]
                input.auth.identity.resource_access[servername].roles[_] == toolname
              }
          metrics: true
      response:
        success:
          headers:
            x-authorized-tools:
              wristband:
                issuer: http://authorino-authorino-oidc.kuadrant-system.svc.cluster.local:8083/mcp-system/mcp-gateway-auth/x-authorized-tools
                signingKeyRefs:
                  - name: wristband-signing-key
                    algorithm: ES256
                tokenDuration: 300
                customClaims:
                  allowed-tools:
                    selector: auth.authorization.tool-roles.allowed_tools
                  groups:
                    selector: auth.identity.groups
              metrics: true
            # Route to the correct MCPVirtualServer based on group membership.
            # VirtualMCPServer filters tools/list only (discovery, not enforcement).
            # Enforcement of tools/call is handled by the Rego block above.
            x-mcp-virtualserver:
              plain:
                expression: '"mcp-admins" in auth.identity.groups ? "mcp-system/admin-tools" : "mcp-system/user-tools"'
            # Inject the authenticated username for access log capture.
            x-auth-username:
              plain:
                selector: auth.identity.preferred_username
            # Strip the Authorization header before forwarding to the backend.
            # Without this, the OpenShift MCP server uses the Keycloak JWT
            # for K8s API auth instead of its ServiceAccount token, and fails.
            authorization:
              plain:
                value: ""
        unauthenticated:
          message:
            value: "Authentication required."
