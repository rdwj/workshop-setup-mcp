---
apiVersion: v1
kind: Namespace
metadata:
  name: gpt-oss-model
  labels:
    opendatahub.io/dashboard: "true"
---
apiVersion: v1
kind: Secret
metadata:
  name: gpt-oss-20b-connection
  namespace: gpt-oss-model
  labels:
    opendatahub.io/dashboard: "true"
    opendatahub.io/managed: "true"
  annotations:
    opendatahub.io/connection-hidden: "true"
    opendatahub.io/connection-type-protocol: uri
    opendatahub.io/connection-type-ref: uri-v1
    openshift.io/display-name: gpt-oss-20b-connection
type: Opaque
stringData:
  URI: "oci://registry.redhat.io/rhelai1/modelcar-gpt-oss-20b:1.5"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: redhataigpt-oss-20b-sa
  namespace: gpt-oss-model
---
apiVersion: v1
kind: Secret
metadata:
  name: default-token-redhataigpt-oss-20b-sa
  namespace: gpt-oss-model
  labels:
    opendatahub.io/dashboard: "true"
  annotations:
    kubernetes.io/service-account.name: redhataigpt-oss-20b-sa
    openshift.io/display-name: default-token
type: kubernetes.io/service-account-token
---
apiVersion: serving.kserve.io/v1alpha1
kind: ServingRuntime
metadata:
  name: redhataigpt-oss-20b
  namespace: gpt-oss-model
  labels:
    opendatahub.io/dashboard: "true"
  annotations:
    opendatahub.io/apiProtocol: REST
    opendatahub.io/recommended-accelerators: '["nvidia.com/gpu"]'
    opendatahub.io/runtime-version: v0.18.0
    opendatahub.io/serving-runtime-scope: global
    opendatahub.io/template-display-name: vLLM NVIDIA GPU ServingRuntime for KServe
    opendatahub.io/template-name: vllm-cuda-runtime-template
    openshift.io/display-name: vLLM NVIDIA GPU ServingRuntime for KServe
spec:
  annotations:
    opendatahub.io/kserve-runtime: vllm
    prometheus.io/path: /metrics
    prometheus.io/port: "8080"
  containers:
  - name: kserve-container
    image: registry.redhat.io/rhaii/vllm-cuda-rhel9@sha256:ad06abf3bb5235ebb5b2df84cd1b9fd09e823f0ff2eebfc82bb4590275ccfe0b
    command:
    - python
    - -m
    - vllm.entrypoints.openai.api_server
    args:
    - --port=8080
    - --model=/mnt/models
    - --served-model-name={{.Name}}
    env:
    - name: HF_HOME
      value: /tmp/hf_home
    ports:
    - containerPort: 8080
      protocol: TCP
  multiModel: false
  supportedModelFormats:
  - autoSelect: true
    name: vLLM
---
apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: redhataigpt-oss-20b
  namespace: gpt-oss-model
  labels:
    networking.kserve.io/visibility: exposed
    opendatahub.io/dashboard: "true"
    opendatahub.io/genai-asset: "true"
  annotations:
    modelFormat: vLLM
    opendatahub.io/connections: gpt-oss-20b-connection
    opendatahub.io/hardware-profile-name: nvidia-gpu
    opendatahub.io/hardware-profile-namespace: redhat-ods-applications
    opendatahub.io/model-type: generative
    openshift.io/display-name: "RedHatAI/gpt-oss-20b"
    security.opendatahub.io/enable-auth: "true"
    serving.kserve.io/deploymentMode: Standard
spec:
  predictor:
    automountServiceAccountToken: false
    deploymentStrategy:
      type: RollingUpdate
    maxReplicas: 1
    minReplicas: 1
    model:
      modelFormat:
        name: vLLM
      name: ""
      resources:
        limits:
          cpu: "2"
          memory: 8Gi
          nvidia.com/gpu: "1"
        requests:
          cpu: "2"
          memory: 8Gi
          nvidia.com/gpu: "1"
      runtime: redhataigpt-oss-20b
      storageUri: "oci://registry.redhat.io/rhelai1/modelcar-gpt-oss-20b:1.5"
    timeout: 30
    tolerations:
    - key: nvidia.com/gpu
      operator: Exists
      effect: NoSchedule
