---
# Deploys gpt-oss-20b the way the RHOAI 3.4 Model Catalog does: as an
# LLMInferenceService (the llm-d serving path). This resource type is
# MaaS-native — its router attaches to the maas-default-gateway from
# Module 13, so the model is published at
# https://inference.maas.<CLUSTER_DOMAIN>/gpt-oss-model/redhataigpt-oss-20b
# with no separate "add to MaaS" step.
apiVersion: v1
kind: Namespace
metadata:
  name: gpt-oss-model
  labels:
    opendatahub.io/dashboard: "true"
---
apiVersion: v1
kind: Secret
metadata:
  name: gpt-oss-20b-connection
  namespace: gpt-oss-model
  labels:
    opendatahub.io/dashboard: "true"
    opendatahub.io/managed: "true"
  annotations:
    opendatahub.io/connection-hidden: "true"
    opendatahub.io/connection-type-protocol: uri
    opendatahub.io/connection-type-ref: uri-v1
    openshift.io/display-name: gpt-oss-20b-connection
type: Opaque
stringData:
  URI: "oci://registry.redhat.io/rhelai1/modelcar-gpt-oss-20b:1.5"
---
# Per-service copy of the well-known vLLM NVIDIA CUDA template
# (v3-4-0-kserve-config-llm-template-nvidia-cuda) — this is exactly what
# the dashboard creates on a catalog deploy. The LLMInferenceService
# below references it via baseRefs. On RHOAI releases newer than 3.4,
# compare against the current well-known config:
#   oc get llminferenceserviceconfig -A | grep nvidia-cuda
apiVersion: serving.kserve.io/v1alpha2
kind: LLMInferenceServiceConfig
metadata:
  name: redhataigpt-oss-20b
  namespace: gpt-oss-model
  annotations:
    openshift.io/description: vLLM NVIDIA CUDA GPU LLMInferenceServiceConfig for LLMInferenceService.
    openshift.io/display-name: vLLM NVIDIA CUDA GPU LLMInferenceServiceConfig
spec:
  model:
    uri: ""
  template:
    containers:
    - name: main
      image: registry.redhat.io/rhaii/vllm-cuda-rhel9@sha256:ad06abf3bb5235ebb5b2df84cd1b9fd09e823f0ff2eebfc82bb4590275ccfe0b
      resources: {}
---
apiVersion: serving.kserve.io/v1alpha2
kind: LLMInferenceService
metadata:
  name: redhataigpt-oss-20b
  namespace: gpt-oss-model
  labels:
    opendatahub.io/dashboard: "true"
    opendatahub.io/genai-asset: "true"
  annotations:
    opendatahub.io/connections: gpt-oss-20b-connection
    opendatahub.io/hardware-profile-name: nvidia-gpu
    opendatahub.io/hardware-profile-namespace: redhat-ods-applications
    opendatahub.io/model-type: generative
    openshift.io/display-name: "RedHatAI/gpt-oss-20b"
spec:
  baseRefs:
  - name: redhataigpt-oss-20b
  model:
    name: redhataigpt-oss-20b
    uri: "oci://registry.redhat.io/rhelai1/modelcar-gpt-oss-20b:1.5"
  replicas: 1
  router:
    gateway:
      refs:
      - name: maas-default-gateway
        namespace: openshift-ingress
    route: {}
  template:
    containers:
    - name: main
      resources:
        limits:
          cpu: "2"
          memory: 8Gi
          nvidia.com/gpu: "1"
        requests:
          cpu: "2"
          memory: 8Gi
          nvidia.com/gpu: "1"
    tolerations:
    - key: nvidia.com/gpu
      operator: Exists
      effect: NoSchedule
