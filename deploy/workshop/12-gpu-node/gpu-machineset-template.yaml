apiVersion: machine.openshift.io/v1beta1
kind: MachineSet
metadata:
  name: <INFRA_ID>-gpu-<AZ>
  namespace: openshift-machine-api
  labels:
    machine.openshift.io/cluster-api-cluster: <INFRA_ID>
spec:
  replicas: 1
  selector:
    matchLabels:
      machine.openshift.io/cluster-api-cluster: <INFRA_ID>
      machine.openshift.io/cluster-api-machineset: <INFRA_ID>-gpu-<AZ>
  template:
    metadata:
      labels:
        machine.openshift.io/cluster-api-cluster: <INFRA_ID>
        machine.openshift.io/cluster-api-machine-role: worker
        machine.openshift.io/cluster-api-machine-type: worker
        machine.openshift.io/cluster-api-machineset: <INFRA_ID>-gpu-<AZ>
    spec:
      metadata:
        labels:
          node-role.kubernetes.io/gpu: ""
          node-role.kubernetes.io/worker: ""
      taints:
        - key: nvidia.com/gpu
          effect: NoSchedule
      providerSpec:
        value:
          apiVersion: machine.openshift.io/v1beta1
          kind: AWSMachineProviderConfig
          ami:
            id: <AMI_ID>
          instanceType: g6e.4xlarge
          iamInstanceProfile:
            id: <INFRA_ID>-worker-profile
          blockDevices:
            - ebs:
                volumeSize: 200
                volumeType: gp3
          credentialsSecret:
            name: aws-cloud-credentials
          deviceIndex: 0
          placement:
            availabilityZone: <AZ>
            region: <REGION>
          securityGroups:
            - filters:
                - name: tag:Name
                  values:
                    - <SECURITY_GROUP>
          subnet:
            filters:
              - name: tag:Name
                values:
                  - <SUBNET>
          tags:
            - name: kubernetes.io/cluster/<INFRA_ID>
              value: owned
          userDataSecret:
            name: worker-user-data
