apiVersion: mcp.kuadrant.io/v1alpha1
kind: MCPServerRegistration
metadata:
  name: calculus-helper
  namespace: mcp-ecosystem
spec:
  toolPrefix: calculus_
  # No trailing slash: the FastMCP server answers on /mcp only; /mcp/
  # returns 404 and the broker health check fails (READY=False).
  path: /mcp
  targetRef:
    kind: HTTPRoute
    name: calculus-helper
