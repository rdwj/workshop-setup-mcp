apiVersion: v1
kind: Service
metadata:
  name: {{ include "workshop-setup-mcp-ui.fullname" . }}
  labels:
    {{- include "workshop-setup-mcp-ui.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "workshop-setup-mcp-ui.selectorLabels" . | nindent 4 }}
