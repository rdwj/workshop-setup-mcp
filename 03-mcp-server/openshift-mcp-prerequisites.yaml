apiVersion: v1
kind: ServiceAccount
metadata:
  name: mcp-viewer
  namespace: mcp-ecosystem
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: mcp-viewer-binding
subjects:
  - kind: ServiceAccount
    name: mcp-viewer
    namespace: mcp-ecosystem
roleRef:
  kind: ClusterRole
  name: view
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: openshift-mcp-server-config
  namespace: mcp-ecosystem
data:
  config.toml: |
    log_level = 2
    port = "8080"
    read_only = true
    disable_destructive = true
    toolsets = ["core", "config"]

    [[denied_resources]]
    group = ""
    version = "v1"
    kind = "Secret"
